<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Future Store — Gadgets</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<header class="store-header">
  <div class="logo">Future Store</div>
  <div id="cart-icon-container">
    <span class="cart-icon">🛒</span>
    <span id="cart-count"></span>
  </div>
</header>
<section id="shop-section">
  <h1>Smartphones</h1>
  <div id="catalog"></div>
</section>
<section id="cart-preview" class="cart-preview">
  <h2>Your Basket</h2>
  <div id="cart-items-list">
    <!-- Здесь JS будет рисовать строки: Название - Кол-во - Цена -->
  </div>
  <hr>
  <div class="cart-summary">
    <p>Weight: <span id="total-weight">0</span> kg</p>
    <p>Shipping: <span id="shipping-cost">0</span> €</p>
    <p>Tax (19%): <span id="tax-amount">0</span> €</p>
    <h3>Total: <span id="grand-total">0</span> €</h3>
  </div>
  <button id="checkout-btn">Checkout</button>
</section>

<script type="module" src="./js/main.js"></script>
</body>
</html>
