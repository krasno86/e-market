<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Future Store — Gadgets</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<section id="registration-section">
  <div class="auth-container">
    <form id="auth-form" class="auth-form">
      <h2>Welcome to Future Store</h2>
      <p class="auth-subtitle">Please register to start shopping</p>

      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" placeholder="e.g. alex@hamburg.de" required>
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="reg-pass">Password</label>
        <input type="password" id="reg-pass" name="pass" placeholder="At least 6 characters" required>
        <span class="error-msg" id="pass-error"></span>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" name="confirmPassword" placeholder="Repeat your password" required>
        <span class="error-msg" id="confirm-error"></span>
      </div>

      <button type="submit" class="auth-btn">Create Account & Shop</button>
    </form>
  </div>
</section>
<section id="shop-section">
  <header class="main-header">
    <div class="cart-wrapper">
      <div class="cart-icon-box">
        <span class="icon">🛒</span>
        <span id="cart-count"></span>
      </div>
      <span class="cart-label">My Cart</span>
    </div>
  </header>
  <h1>Smartphones</h1>
  <div id="catalog"></div>
  <section id="cart-preview" class="cart-preview">
    <h2>Your Cart</h2>
    <div id="cart-items-list"></div>
    <hr>
    <div class="cart-summary">
      <p>Weight: <span id="total-weight"></span> kg</p>
      <p>Shipping: <span id="shipping-cost"></span> €</p>
      <p>Subtotal: <span id="sub-total"></span> €</p>
      <p>Tax (19%): <span id="tax-amount"></span> €</p>
      <h3>Total: <span id="grand-total"></span> €</h3>
    </div>
    <div class="center">
      <button id="checkout-btn">Checkout</button>
    </div>
  </section>
</section>


<script type="module" src="./js/main.js"></script>
</body>
</html>
